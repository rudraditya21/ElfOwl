# elf-owl Agent Configuration
# Default configuration for the compliance observer agent

agent:
  # Cluster identification
  cluster_id: "default"
  node_name: "${HOSTNAME}"

  # Logging configuration
  logging:
    level: "info"  # debug, info, warn, error
    format: "json"
    output: "stdout"

  # cilium/ebpf Security Monitors (Phase 3: goBPF migration complete)
  ebpf:
    enabled: true  # Master switch - must be true to enable any monitors
    kernel_btf_path: ""  # Optional override for kernel BTF (CO-RE)
    process:
      enabled: true
      buffer_size: 8192
      timeout: 5s
    network:
      enabled: true
      buffer_size: 8192
      timeout: 5s
    dns:
      enabled: true
      buffer_size: 4096
      timeout: 5s
    file:
      enabled: true
      buffer_size: 8192
      timeout: 5s
    capability:
      enabled: true
      buffer_size: 4096
      timeout: 5s
    perf_buffer:
      enabled: true
      page_count: 64
      lost_handler: true
    ring_buffer:
      enabled: false  # Use perf buffer by default (better compatibility)
      size: 65536

  # Kubernetes integration
  kubernetes:
    in_cluster: true
    metadata_cache_ttl: 300s
    watch_interval: 30s

  # Rule engine configuration
  rules:
    config_map:
      name: "elf-owl-rules"
      namespace: "elf-owl-system"
    eval_timeout: 5s
    log_violations: true

  # Event enrichment
  enrichment:
    kubernetes_metadata: true
    metadata_cache_size: 10000
    metadata_cache_ttl: 60s
    kubernetes_only: true    # discard host-process events; set false for bare-metal or mixed deployments

  # Evidence signing and encryption
  evidence:
    signing:
      enabled: true
      algorithm: "HMAC-SHA256"
    encryption:
      enabled: true
      algorithm: "AES-256-GCM"

  # Owl SaaS API configuration
  owl_api:
    endpoint: "https://owl-saas.example.com"

    # Authentication
    auth:
      method: "jwt"
      token_path: "/var/run/secrets/owl-jwt-token"

    # Push configuration
    push:
      batch_size: 100
      batch_timeout: 30s
      enabled: true
      dry_run: false

    # Retry configuration
    retry:
      max_retries: 10
      initial_backoff: 1s
      max_backoff: 60s
      backoff_multiplier: 2.0

    # TLS configuration
    tls:
      enabled: true
      verify: true
      ca_cert_path: "/etc/elf-owl/ca.crt"

  # Prometheus metrics
  metrics:
    enabled: true
    listen_address: ":9090"
    path: "/metrics"

  # Health check endpoints
  health:
    enabled: true
    listen_address: ":9091"
    path: "/health"

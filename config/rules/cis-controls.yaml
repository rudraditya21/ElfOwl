# ANCHOR: CIS Kubernetes v1.8 automated controls - Phase 3.1 Week 3
# 48 automated compliance controls for Kubernetes pod security
# Generated from pkg/rules/cis_mappings.go for easy configuration management

---
# ===== POD SECURITY CONTEXT CONTROLS =====

# CIS 4.5.1: Minimize the admission of privileged containers
- controlID: CIS_4.5.1
  title: Minimize the admission of privileged containers
  severity: CRITICAL
  eventTypes:
    - process_execution
    - pod_spec_check
  conditions:
    - field: container.security_context.privileged
      operator: equals
      value: true

# CIS 4.5.2: Ensure containers do not run as root
- controlID: CIS_4.5.2
  title: Ensure containers do not run as root
  severity: HIGH
  eventTypes:
    - process_execution
  conditions:
    - field: process.uid
      operator: equals
      value: 0
    - field: kubernetes.pod_uid
      operator: not_equals
      value: ""

# CIS 4.5.3: Minimize Linux Kernel Capability usage
- controlID: CIS_4.5.3
  title: Minimize Linux Kernel Capability usage
  severity: HIGH
  eventTypes:
    - capability_usage
  conditions:
    - field: capability.name
      operator: in
      value:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_MODULE
        - SYS_PTRACE
        - SYS_BOOT
        - MAC_ADMIN

# CIS 4.5.5: Ensure the filesystem is read-only where possible
- controlID: CIS_4.5.5
  title: Ensure the filesystem is read-only where possible
  severity: MEDIUM
  eventTypes:
    - file_access
  conditions:
    - field: file.path
      operator: in
      value:
        - /
        - /bin
        - /sbin
        - /usr/bin
        - /usr/sbin
        - /etc
        - /lib
        - /usr/lib

# CIS 4.1.1: Ensure ServiceAccount admission controller is enabled
- controlID: CIS_4.1.1
  title: Ensure ServiceAccount admission controller is enabled
  severity: HIGH
  eventTypes:
    - pod_spec_check
  conditions:
    - field: kubernetes.service_account
      operator: equals
      value: "default"

# CIS 4.6.1: Ensure default deny NetworkPolicy is in place
- controlID: CIS_4.6.1
  title: Ensure default deny NetworkPolicy is in place
  severity: HIGH
  eventTypes:
    - network_connection
    - network_policy_check
  conditions:
    - field: kubernetes.has_default_deny_policy
      operator: not_equals
      value: true

# CIS 4.2.1: Ensure runAsNonRoot enforcement
- controlID: CIS_4.2.1
  title: Ensure containers run as non-root user
  severity: HIGH
  eventTypes:
    - process_execution
  conditions:
    - field: container.run_as_root
      operator: equals
      value: true

# CIS 4.2.2: Minimize allowPrivilegeEscalation
- controlID: CIS_4.2.2
  title: Minimize allowPrivilegeEscalation
  severity: HIGH
  eventTypes:
    - process_execution
    - capability_usage
  conditions:
    - field: container.allow_privilege_escalation
      operator: equals
      value: true

# CIS 4.2.3: Ensure hostNetwork is disabled
- controlID: CIS_4.2.3
  title: Ensure hostNetwork is disabled
  severity: HIGH
  eventTypes:
    - network_connection
  conditions:
    - field: container.host_network
      operator: equals
      value: true

# CIS 4.2.4: Ensure hostIPC is disabled
- controlID: CIS_4.2.4
  title: Ensure hostIPC is disabled
  severity: HIGH
  eventTypes:
    - process_execution
  conditions:
    - field: container.host_ipc
      operator: equals
      value: true

# CIS 4.2.5: Ensure hostPID is disabled
- controlID: CIS_4.2.5
  title: Ensure hostPID is disabled
  severity: HIGH
  eventTypes:
    - process_execution
  conditions:
    - field: container.host_pid
      operator: equals
      value: true

# CIS 4.2.6: Ensure restrictive capabilities
- controlID: CIS_4.2.6
  title: Ensure containers do not have dangerous capabilities
  severity: HIGH
  eventTypes:
    - capability_usage
  conditions:
    - field: capability.name
      operator: in
      value:
        - NET_ADMIN
        - NET_RAW
        - SYS_ADMIN
        - SYS_MODULE
        - SYS_PTRACE
        - SYS_BOOT
        - MAC_ADMIN
        - MAC_OVERRIDE
        - DAC_OVERRIDE
        - DAC_READ_SEARCH
        - SETFCAP

# CIS 4.2.7: Ensure seccomp enforcement
- controlID: CIS_4.2.7
  title: Ensure seccomp profile enforcement
  severity: MEDIUM
  eventTypes:
    - process_execution
  conditions:
    - field: container.seccomp_profile
      operator: equals
      value: unconfined

# CIS 4.2.8: Ensure AppArmor enforcement
- controlID: CIS_4.2.8
  title: Ensure AppArmor profile enforcement
  severity: MEDIUM
  eventTypes:
    - process_execution
  conditions:
    - field: container.apparmor_profile
      operator: equals
      value: unconfined

# ===== CONTAINER IMAGE & REGISTRY CONTROLS =====

# CIS 4.3.1: Ensure images from known registry
- controlID: CIS_4.3.1
  title: Ensure container images are from known registries
  severity: MEDIUM
  eventTypes:
    - pod_spec_check
  conditions:
    - field: kubernetes.image_registry
      operator: not_equals
      value: "docker.io"

# CIS 4.3.2: Ensure images without 'latest' tag
- controlID: CIS_4.3.2
  title: Ensure container images do not use 'latest' tag
  severity: MEDIUM
  eventTypes:
    - pod_spec_check
  conditions:
    - field: kubernetes.image_tag
      operator: equals
      value: "latest"

# CIS 4.3.3: Ensure image pull policy is Always
- controlID: CIS_4.3.3
  title: Ensure image pull policy is Always
  severity: MEDIUM
  eventTypes:
    - pod_spec_check
  conditions:
    - field: container.image_pull_policy
      operator: not_equals
      value: "Always"

# CIS 4.3.4: Minimize admission of images with unknown vulnerabilities
- controlID: CIS_4.3.4
  title: Ensure images are scanned for vulnerabilities
  severity: MEDIUM
  eventTypes:
    - pod_spec_check
  conditions:
    - field: container.image_scan_status
      operator: not_equals
      value: "scanned"

# CIS 4.3.5: Ensure image registry access control
- controlID: CIS_4.3.5
  title: Ensure image registry authentication is required
  severity: HIGH
  eventTypes:
    - pod_spec_check
  conditions:
    - field: container.image_registry_auth
      operator: equals
      value: false

# CIS 4.3.6: Ensure image signature verification
- controlID: CIS_4.3.6
  title: Ensure image signature verification is enforced
  severity: HIGH
  eventTypes:
    - pod_spec_check
  conditions:
    - field: container.image_signed
      operator: equals
      value: false


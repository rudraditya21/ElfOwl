# TLS/JA3 validation profile for local testing.
# Use this file as the active config when you want to isolate the TLS path.

agent:
  cluster_id: "default"
  node_name: "${HOSTNAME}"

  logging:
    level: "debug"
    format: "json"
    output: "stdout"

  ebpf:
    enabled: true
    kernel_btf_path: ""
    process:
      enabled: false
      buffer_size: 8192
      timeout: 5s
    network:
      enabled: false
      buffer_size: 8192
      timeout: 5s
    dns:
      enabled: false
      buffer_size: 4096
      timeout: 5s
    file:
      enabled: false
      buffer_size: 8192
      timeout: 5s
    capability:
      enabled: false
      buffer_size: 4096
      timeout: 5s
    tls:
      enabled: true
      buffer_size: 4096
      timeout: 5s
    perf_buffer:
      enabled: true
      page_count: 256
      lost_handler: true
    ring_buffer:
      enabled: false
      size: 65536

  kubernetes:
    in_cluster: false
    metadata_cache_ttl: 300s
    watch_interval: 0s

  rules:
    config_map:
      name: ""
      namespace: ""
    eval_timeout: 5s
    log_violations: true

  enrichment:
    kubernetes_metadata: false
    metadata_cache_size: 10000
    metadata_cache_ttl: 60s
    kubernetes_only: false

  evidence:
    signing:
      enabled: true
      algorithm: "HMAC-SHA256"
    encryption:
      enabled: true
      algorithm: "AES-256-GCM"

  owl_api:
    endpoint: "https://owl-saas.example.com"
    auth:
      method: "jwt"
      token_path: "/var/run/secrets/owl-jwt-token"
    push:
      batch_size: 100
      batch_timeout: 30s
      enabled: true
      dry_run: false
    retry:
      max_retries: 10
      initial_backoff: 1s
      max_backoff: 60s
      backoff_multiplier: 2.0
    tls:
      enabled: false
      verify: true
      ca_cert_path: ""

  metrics:
    enabled: true
    listen_address: ":9090"
    path: "/metrics"

  health:
    enabled: true
    listen_address: ":9091"
    path: "/health"

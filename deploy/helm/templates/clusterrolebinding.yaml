apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elf-owl
  labels:
    app: elf-owl
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elf-owl
subjects:
  - kind: ServiceAccount
    name: elf-owl
    namespace: {{ .Release.Namespace }}

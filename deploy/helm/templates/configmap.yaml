apiVersion: v1
kind: ConfigMap
metadata:
  name: elf-owl-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: elf-owl
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
data:
  elf-owl.yaml: |
    agent:
      cluster_id: {{ .Values.clusterID | quote }}
      node_name: ""  # Populated at runtime via OWL_NODE_NAME env var (fieldRef)

      logging:
        level: {{ .Values.logging.level | quote }}
        format: {{ .Values.logging.format | quote }}
        output: "stdout"

      ebpf:
        enabled: {{ .Values.ebpf.enabled }}
        process:
          enabled: {{ .Values.ebpf.process.enabled }}
          buffer_size: {{ .Values.ebpf.process.bufferSize }}
          timeout: 5s
        network:
          enabled: {{ .Values.ebpf.network.enabled }}
          buffer_size: {{ .Values.ebpf.network.bufferSize }}
          timeout: 5s
        dns:
          enabled: {{ .Values.ebpf.dns.enabled }}
          buffer_size: {{ .Values.ebpf.dns.bufferSize }}
          timeout: 5s
        file:
          enabled: {{ .Values.ebpf.file.enabled }}
          buffer_size: {{ .Values.ebpf.file.bufferSize }}
          timeout: 5s
        capability:
          enabled: {{ .Values.ebpf.capability.enabled }}
          buffer_size: {{ .Values.ebpf.capability.bufferSize }}
          timeout: 5s

      kubernetes:
        in_cluster: true
        metadata_cache_ttl: 60s

      owl_api:
        endpoint: {{ .Values.owl.endpoint | quote }}
        auth:
          method: "jwt"
          token_path: "/var/run/secrets/owl-api-token/api-token"
        push:
          batch_size: 100
          batch_timeout: 10s
          enabled: true
          dry_run: false
        retry:
          max_retries: 10
          initial_backoff: 1s
          max_backoff: 60s
          backoff_multiplier: 2.0
        tls:
          enabled: true
          verify: true

      metrics:
        enabled: {{ .Values.metrics.enabled }}
        listen_address: {{ .Values.metrics.listenAddress | quote }}
        path: {{ .Values.metrics.path | quote }}

      health:
        enabled: {{ .Values.health.enabled }}
        listen_address: {{ .Values.health.listenAddress | quote }}
        path: {{ .Values.health.path | quote }}
